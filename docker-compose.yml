version: "3.9"

networks:
  rahatio:
    name: rahatio-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: rahatio-postgres
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3606:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rahatio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rahatio}
      POSTGRES_DB: ${POSTGRES_DB:-rahatio}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rahatio} -d ${POSTGRES_DB:-rahatio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rahatio-redis
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3679:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: rahatio-minio
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3700:9000"
      - "3701:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-api:
    build:
      context: .
      dockerfile: packages/core/Dockerfile
    container_name: rahatio-core
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3680:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rahatio}:${POSTGRES_PASSWORD:-rahatio}@postgres:5432/${POSTGRES_DB:-rahatio}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      RAHAT_INTERNAL_KEY: ${RAHAT_INTERNAL_KEY:-change-me-internal-key}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-rahatio-media}
      APP_URL: ${APP_URL:-https://api.rahatio.com.tr}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://rahatio.com.tr,https://admin.rahatio.com.tr}
      AI_SERVICE_URL: http://ai-service:3001
      INTEGRATION_SERVICE_URL: http://integration-service:3002
      CORE_API_KEY: ${CORE_API_KEY:-core-internal-key}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RUN_SEEDERS: ${RUN_SEEDERS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: packages/ai-service/Dockerfile
    container_name: rahatio-ai
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3630:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      COMFY_URL: ${COMFY_URL:-http://host.docker.internal:8188}
      REDIS_URL: redis://redis:6379
      CORE_API_KEY: ${CORE_API_KEY:-core-internal-key}
      CORE_API_URL: http://core-api:3000
    depends_on:
      redis:
        condition: service_healthy

  integration-service:
    build:
      context: .
      dockerfile: packages/integration-service/Dockerfile
    container_name: rahatio-integration
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3631:3002"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3002
      REDIS_URL: redis://redis:6379
      CORE_API_URL: http://core-api:3000
      CORE_API_KEY: ${CORE_API_KEY:-core-internal-key}
      RAHAT_INTERNAL_KEY: ${RAHAT_INTERNAL_KEY:-change-me-internal-key}
      TRENDYOL_API_KEY: ${TRENDYOL_API_KEY:-}
      TRENDYOL_API_SECRET: ${TRENDYOL_API_SECRET:-}
      TRENDYOL_SUPPLIER_ID: ${TRENDYOL_SUPPLIER_ID:-}
      HEPSIBURADA_USERNAME: ${HEPSIBURADA_USERNAME:-}
      HEPSIBURADA_PASSWORD: ${HEPSIBURADA_PASSWORD:-}
      HEPSIBURADA_MERCHANT_ID: ${HEPSIBURADA_MERCHANT_ID:-}
      PAZARAMA_CLIENT_ID: ${PAZARAMA_CLIENT_ID:-}
      PAZARAMA_CLIENT_SECRET: ${PAZARAMA_CLIENT_SECRET:-}
      PAZARAMA_API_KEY: ${PAZARAMA_API_KEY:-}
      N11_APPKEY: ${N11_APPKEY:-}
      N11_APPSECRET: ${N11_APPSECRET:-}
      AMAZON_REFRESH_TOKEN: ${AMAZON_REFRESH_TOKEN:-}
      AMAZON_LWA_CLIENT_ID: ${AMAZON_LWA_CLIENT_ID:-}
      AMAZON_LWA_CLIENT_SECRET: ${AMAZON_LWA_CLIENT_SECRET:-}
      AMAZON_AWS_ACCESS_KEY: ${AMAZON_AWS_ACCESS_KEY:-}
      AMAZON_AWS_SECRET_KEY: ${AMAZON_AWS_SECRET_KEY:-}
      AMAZON_SELLER_ID: ${AMAZON_SELLER_ID:-}
      ETSY_CLIENT_ID: ${ETSY_CLIENT_ID:-}
      ETSY_CLIENT_SECRET: ${ETSY_CLIENT_SECRET:-}
      ETSY_REDIRECT_URI: ${ETSY_REDIRECT_URI:-}
    depends_on:
      redis:
        condition: service_healthy
      core-api:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/asbajans/rahatio/frontend:latest
    container_name: rahatio-frontend
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3690:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.rahatio.com.tr}
      API_PROXY_TARGET: http://core-api:3000
    depends_on:
      core-api:
        condition: service_started
