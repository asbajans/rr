version: "3.9"

networks:
  rahatio:
    name: rahatio-network
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:

services:
  mysql:
    image: mysql:8.0
    container_name: rahatio-mysql
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3606:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rahatio}
      MYSQL_USER: ${MYSQL_USER:-rahatio}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rahatio}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rahatio-redis
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3679:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: rahatio-minio
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3701:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  laravel-app:
    image: asbajans/rahatio-core:latest
    pull_policy: always
    container_name: rahatio-core
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "${NGINX_PORT:-3680}:80"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: rahatio
      MINIO_PUBLIC_URL: /api/media
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: https://rahatio.com.tr
      DB_HOST: mysql
      DB_DATABASE: ${MYSQL_DATABASE:-rahatio}
      DB_USERNAME: ${MYSQL_USER:-rahatio}
      DB_PASSWORD: ${MYSQL_PASSWORD:-rahatio}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      INTEGRATION_SERVICE_URL: http://rahatio-integration:3001
      AI_SERVICE_URL: http://rahatio-ai:3000
      CORE_API_KEY: ${CORE_API_KEY:-}
      RAHAT_INTERNAL_KEY: ${RAHAT_INTERNAL_KEY:-change-me-internal-key}
      STRIPE_KEY: ${STRIPE_KEY:-}
      STRIPE_SECRET: ${STRIPE_SECRET:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    image: asbajans/rahatio-ai:latest
    pull_policy: always
    container_name: rahatio-ai
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3630:3000"
    environment:
      NODE_ENV: ${APP_ENV:-production}
      OLLAMA_URL: http://host.docker.internal:11434
      COMFY_URL: http://host.docker.internal:8188

  integration-service:
    image: asbajans/rahatio-integration:latest
    pull_policy: always
    container_name: rahatio-integration
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "3631:3001"
    environment:
      PORT: 3001
      NODE_ENV: ${APP_ENV:-production}
      REDIS_URL: redis://redis:6379
      CORE_ENGINE_ORDER_URL: http://rahatio-core/api/orders
      CORE_API_KEY: ${CORE_API_KEY:-}
      HB_USERNAME: ${HB_USERNAME:-}
      HB_PASSWORD: ${HB_PASSWORD:-}
      HB_MERCHANT_ID: ${HB_MERCHANT_ID:-}
      TRENDYOL_API_KEY: ${TRENDYOL_API_KEY:-}
      TRENDYOL_API_SECRET: ${TRENDYOL_API_SECRET:-}
      TRENDYOL_SUPPLIER_ID: ${TRENDYOL_SUPPLIER_ID:-}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: asbajans/rahatio-frontend:latest
    pull_policy: always
    container_name: rahatio-frontend
    restart: unless-stopped
    networks:
      - rahatio
    ports:
      - "${FRONTEND_PORT:-3690}:3000"
    environment:
      NODE_ENV: ${APP_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://rahatio-core:80}

