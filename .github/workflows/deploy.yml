name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-frontend:${{ github.sha }}

  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push core
        uses: docker/build-push-action@v6
        with:
          context: ./core-engine
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-core:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-core:${{ github.sha }}

  deploy:
    needs: [build-frontend, build-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Redeploy Portainer stack (update file + pull new images)
        env:
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request

          token = os.environ.get("PORTAINER_API_KEY")
          if not token:
              print("No PORTAINER_API_KEY set; skipping redeploy")
              raise SystemExit(0)

          with open("docker-compose.yml", encoding="utf-8") as f:
              content = f.read()

          body = json.dumps({
              "StackFileContent": content,
              "Env": [],
              "Prune": True,
          }).encode("utf-8")

          url = "https://cont.asb.web.tr/api/stacks/66?endpointId=2"
          req = urllib.request.Request(
              url,
              data=body,
              method="PUT",
              headers={"X-API-Key": token, "Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req, timeout=120) as r:
              print("redeploy status:", r.status)
          PY
