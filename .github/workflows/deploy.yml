name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-frontend:${{ github.sha }}

  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push core
        uses: docker/build-push-action@v6
        with:
          context: ./core-engine
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-core:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-core:${{ github.sha }}

  build-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push integration-service
        uses: docker/build-push-action@v6
        with:
          context: ./integration-service
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-integration:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-integration:${{ github.sha }}

  deploy:
    needs: [build-frontend, build-core, build-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Redeploy Portainer stack (update file + pull new images)
        env:
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request, time

          raw = os.environ.get("PORTAINER_API_KEY") or ""
          token = raw.strip().strip('"').strip("'")
          if not token:
              print("No PORTAINER_API_KEY set; skipping redeploy")
              raise SystemExit(0)
          print(f"token length={len(token)} prefix={token[:4]!r}")

          with open("docker-compose.yml", encoding="utf-8") as f:
              content = f.read()

          body = json.dumps({
              "StackFileContent": content,
              "Env": [],
              "Prune": True,
          }).encode("utf-8")

          url = "https://cont.asb.web.tr/api/stacks/66?endpointId=2"

          last_err = None
          for attempt in range(3):
              try:
                  req = urllib.request.Request(
                      url,
                      data=body,
                      method="PUT",
                      headers={
                          "X-API-Key": token,
                          "Content-Type": "application/json",
                          "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36",
                      },
                  )
                  with urllib.request.urlopen(req, timeout=120) as r:
                      print("redeploy status:", r.status)
                      raise SystemExit(0)
              except urllib.error.HTTPError as e:
                  last_err = e
                  detail = ""
                  try:
                      detail = e.read().decode("utf-8", "replace")
                  except Exception:
                      pass
                  print(f"attempt {attempt+1} failed: HTTP {e.code}")
                  print("body:", detail[:500])
                  if e.code == 403 and "cloudflare" in detail.lower():
                      print("NOTE: blocked by Cloudflare (not auth). Check Cloudflare Bot Fight Mode / WAF for CI runner IPs.")
                  time.sleep(3)
          raise last_err
          PY
