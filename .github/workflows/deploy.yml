name: Deploy

on:
  push:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      ai: ${{ steps.filter.outputs.ai }}
      integration: ${{ steps.filter.outputs.integration }}
      frontend: ${{ steps.filter.outputs.frontend }}
      slave: ${{ steps.filter.outputs.slave }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core-engine/**'
              - '.github/**'
              - 'docker-compose.yml'
            ai:
              - 'ai-service/**'
              - '.github/**'
              - 'docker-compose.yml'
            integration:
              - 'integration-service/**'
              - '.github/**'
              - 'docker-compose.yml'
            frontend:
              - 'frontend/**'
              - '.github/**'
              - 'docker-compose.yml'
            slave:
              - 'slave/**'
              - '.github/**'
            mobile:
              - 'mobile-app/**'
              - '.github/**'

  validate-frontend:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  validate-ai:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.ai == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  validate-integration:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.integration == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  build-core:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.core == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./core-engine
          target: rahatio-core
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-core:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-core:sha-${GITHUB_SHA::7}

  build-ai:
    needs: [detect-changes, validate-ai]
    if: ${{ needs.detect-changes.outputs.ai == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          target: rahatio-ai
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-ai:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-ai:sha-${GITHUB_SHA::7}

  build-integration:
    needs: [detect-changes, validate-integration]
    if: ${{ needs.detect-changes.outputs.integration == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./integration-service
          target: rahatio-integration
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-integration:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-integration:sha-${GITHUB_SHA::7}

  build-frontend:
    needs: [detect-changes, validate-frontend]
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-frontend:sha-${GITHUB_SHA::7}

  validate-mobile:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --legacy-peer-deps
      - run: npx tsc --noEmit

  build-mobile:
    needs: [detect-changes, validate-mobile]
    if: ${{ needs.detect-changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm install --legacy-peer-deps
        working-directory: mobile-app
      - run: eas build --platform android --non-interactive --no-wait
        working-directory: mobile-app

  patch-compose:
    needs: [build-core, build-ai, build-integration, build-frontend]
    if: ${{ always() && (needs.build-core.result == 'success' || needs.build-ai.result == 'success' || needs.build-integration.result == 'success' || needs.build-frontend.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Pin images to commit SHA tag
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          sed -i -E "s#(asbajans/rahatio-[a-z-]*):latest#\1:${TAG}#g" docker-compose.yml
          git config user.email "ci@rahatio.com"
          git config user.name "ci"
          git add docker-compose.yml
          git commit -m "ci: pin images to ${TAG} [skip ci]" || echo "nothing to commit"
          git push

  trigger-portainer:
    needs: [patch-compose]
    if: ${{ needs.patch-compose.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer Webhook
        env:
          WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            curl -s -X POST "$WEBHOOK_URL"
          fi
