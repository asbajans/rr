name: Deploy

on:
  push:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      ai: ${{ steps.filter.outputs.ai }}
      integration: ${{ steps.filter.outputs.integration }}
      frontend: ${{ steps.filter.outputs.frontend }}
      slave: ${{ steps.filter.outputs.slave }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core-engine/**'
              - '.github/**'
              - 'docker-compose.yml'
            ai:
              - 'ai-service/**'
              - '.github/**'
              - 'docker-compose.yml'
            integration:
              - 'integration-service/**'
              - '.github/**'
              - 'docker-compose.yml'
            frontend:
              - 'frontend/**'
              - '.github/**'
              - 'docker-compose.yml'
            slave:
              - 'slave/**'
              - '.github/**'
            mobile:
              - 'mobile-app/**'
              - '.github/**'

  validate-frontend:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  validate-ai:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.ai == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  validate-integration:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.integration == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  build-core:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.core == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./core-engine
          target: rahatio-core
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-core:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-core:${{ github.sha }}

  build-ai:
    needs: [detect-changes, validate-ai]
    if: ${{ needs.detect-changes.outputs.ai == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          target: rahatio-ai
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-ai:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-ai:${{ github.sha }}

  build-integration:
    needs: [detect-changes, validate-integration]
    if: ${{ needs.detect-changes.outputs.integration == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./integration-service
          target: rahatio-integration
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-integration:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-integration:${{ github.sha }}

  build-frontend:
    needs: [detect-changes, validate-frontend]
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-frontend:${{ github.sha }}

  validate-mobile:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --legacy-peer-deps
      - run: npx tsc --noEmit

  build-mobile:
    needs: [detect-changes, validate-mobile]
    if: ${{ needs.detect-changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm install --legacy-peer-deps
        working-directory: mobile-app
      - run: eas build --platform android --non-interactive --no-wait
        working-directory: mobile-app

  deploy:
    needs: [detect-changes, build-core, build-ai, build-integration, build-frontend]
    if: ${{ always() && (needs.build-core.result == 'success' || needs.build-ai.result == 'success' || needs.build-integration.result == 'success' || needs.build-frontend.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (PAT allows pinning the compose)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main

      # Pin only the services that were (re)built to the commit SHA so the
      # running image is always freshly pulled (avoids the :latest cache trap).
      - name: Pin changed images to commit SHA
        if: ${{ secrets.PAT_TOKEN != '' }}
        env:
          SHA: ${{ github.sha }}
          CORE: ${{ needs.detect-changes.outputs.core }}
          AI: ${{ needs.detect-changes.outputs.ai }}
          INTEGRATION: ${{ needs.detect-changes.outputs.integration }}
          FRONTEND: ${{ needs.detect-changes.outputs.frontend }}
        run: |
          pin() {
            local svc="$1"; local changed="$2"
            if [ "$changed" = "true" ]; then
              sed -i -E "s#(image: .*rahatio-${svc}:)[^ ]+#\1${SHA}#" docker-compose.yml
              echo "pinned rahatio-${svc} -> ${SHA}"
            fi
          }
          pin core "$CORE"
          pin ai "$AI"
          pin integration "$INTEGRATION"
          pin frontend "$FRONTEND"

      - name: Commit pinned compose
        if: ${{ secrets.PAT_TOKEN != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          if git diff --cached --quiet; then
            echo "compose unchanged"
          else
            git commit -m "ci: pin images to ${{ github.sha }} [skip ci]"
            git push
          fi

      # git/redeploy pulls the LATEST compose from git and recreates the stack.
      # This is what actually deploys compose changes (the old generic webhook
      # only re-ran the stored compose and never pulled from git).
      - name: Redeploy Portainer stack from git
        env:
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -n "$PORTAINER_API_KEY" ]; then
            echo "Triggering Portainer git/redeploy (pulls latest compose + recreates)"
            curl -s -X PUT \
              -H "X-API-Key: $PORTAINER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "https://cont.asb.web.tr/api/stacks/66/git/redeploy?endpointId=2"
            echo "git/redeploy done"
          elif [ -n "$PORTAINER_WEBHOOK_URL" ]; then
            echo "No API key set; falling back to generic webhook"
            curl -s -X POST "$PORTAINER_WEBHOOK_URL"
          else
            echo "No Portainer credential configured; skipping redeploy"
          fi
