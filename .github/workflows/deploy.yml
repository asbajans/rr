name: Deploy

on:
  push:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      ai: ${{ steps.filter.outputs.ai }}
      integration: ${{ steps.filter.outputs.integration }}
      frontend: ${{ steps.filter.outputs.frontend }}
      slave: ${{ steps.filter.outputs.slave }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core-engine/**'
              - '.github/**'
            ai:
              - 'ai-service/**'
              - '.github/**'
            integration:
              - 'integration-service/**'
              - '.github/**'
            frontend:
              - 'frontend/**'
              - '.github/**'
            slave:
              - 'slave/**'
              - '.github/**'

  validate-frontend:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  validate-ai:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.ai == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  validate-integration:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.integration == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  build-core:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.core == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./core-engine
          target: rahatio-core
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-core:latest

  build-ai:
    needs: [detect-changes, validate-ai]
    if: ${{ needs.detect-changes.outputs.ai == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          target: rahatio-ai
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-ai:latest

  build-integration:
    needs: [detect-changes, validate-integration]
    if: ${{ needs.detect-changes.outputs.integration == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./integration-service
          target: rahatio-integration
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-integration:latest

  build-frontend:
    needs: [detect-changes, validate-frontend]
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-frontend:latest

  validate-slave:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.slave == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slave
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build ./...

  build-slave:
    needs: [detect-changes, validate-slave]
    if: ${{ needs.detect-changes.outputs.slave == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./slave
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/rahatio-slave:latest

  trigger-portainer:
    needs: [build-core, build-ai, build-integration, build-frontend, build-slave]
    if: ${{ always() && (needs.build-core.result == 'success' || needs.build-ai.result == 'success' || needs.build-integration.result == 'success' || needs.build-frontend.result == 'success' || needs.build-slave.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer Webhook
        env:
          WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            curl -s -X POST "$WEBHOOK_URL"
          fi
